<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eggify Menu Planner</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/planner.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="dashboard-body">

    <aside class="sidebar">
        <div class="sidebar-logo">
            <i class="fa-solid fa-egg logo-icon"></i> Eggify
        </div>
        <nav class="sidebar-menu">
            <a href="index.html"><i class="fa-solid fa-house"></i> <span>Beranda</span></a>
            <a href="planner.html" class="active"><i class="fa-solid fa-calendar-days"></i> <span>Planner</span></a>
        </nav>
    </aside>

    <div class="main-wrapper">
        
        <header class="topbar">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Cari menu makanan...">
            </div>
            <div class="user-profile">
                <span>Halo, Arya Kelompok X</span>
                <div class="avatar">A</div>
            </div>
        </header>

        <main class="dashboard-content">
                
            <section class="menu-grid-section">
                <div class="section-header">
                    <h2>Pilih Menu Harian</h2>
                    <p>Sesuaikan kebutuhan gizi dan budget harianmu</p>
                </div>
                
                <div class="menu-grid" id="menuTableBody">
                    </div>
            </section>

            <aside class="summary-sidebar">
                <div class="summary-card">
                    <h3><i class="fa-solid fa-basket-shopping"></i> Hasil Pilihan</h3>
                    
                    <div class="image-stack-container" id="imageStack">
                        <p class="empty-state">Belum ada menu dipilih</p>
                    </div>

                    <div class="calc-box">
                        <div class="calc-row">
                            <span>Total Kalori</span>
                            <strong id="totalCalories">0 kkal</strong>
                        </div>
                        <div class="calc-row">
                            <span>Total Harga</span>
                            <strong id="totalPrice">Rp 0</strong>
                        </div>
                    </div>

                    <div class="gizi-box">
                        <h4>Kelengkapan Kategori Gizi</h4>
                        <ul class="gizi-checklist">
                            <li id="cat-pokok" class="status-belum"><i class="fa-regular fa-circle"></i> Makanan Pokok</li>
                            <li id="cat-lauk" class="status-belum"><i class="fa-regular fa-circle"></i> Lauk-Pauk</li>
                            <li id="cat-sayur" class="status-belum"><i class="fa-regular fa-circle"></i> Sayur</li>
                            <li id="cat-buah" class="status-belum"><i class="fa-regular fa-circle"></i> Buah</li>
                            <li id="cat-minuman" class="status-belum"><i class="fa-regular fa-circle"></i> Minuman</li>
                        </ul>
                    </div>

                    <div id="balancedBadge" class="balanced-badge d-none">
                        <i class="fa-solid fa-circle-check"></i> Menu Seimbang!
                    </div>
                </div>
            </aside>

        </main>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
